media:
  input: static/uploads
  output: /uploads
  rename: safe
  categories: [image]

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename:
      template: '{year}-{month}-{day}-{title}.md'
      field: create
    view:
      primary: title
      fields: [title, date, category, published]
      sort: [date, title, category]
      search: [title, description, category]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: date
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: published
        label: Published
        type: boolean
      - name: category
        label: Category
        type: select
        options:
          values: [Essays, Technical, History, Archive, Notes]
          creatable: true
          placeholder: Select or create a category
      - name: cover
        label: Cover image
        type: image
        options:
          path: covers
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          path: posts
          switcher: true
  - name: site
    label: Site settings
    type: file
    path: src/content/site.json
    fields:
      - name: title
        label: Site title
        type: string
      - name: tagline
        label: Tagline
        type: string
      - name: description
        label: Description
        type: text
      - name: author
        label: Author
        type: string
      - name: language
        label: Language
        type: string
      - name: url
        label: Site URL
        type: string
      - name: giscusRepo
        label: Giscus repo
        type: string
      - name: giscusRepoId
        label: Giscus repo ID
        type: string
      - name: giscusCategory
        label: Giscus category
        type: string
      - name: giscusCategoryId
        label: Giscus category ID
        type: string
      - name: footer
        label: Footer
        type: string

settings:
  content:
    merge: true
  commit:
    templates:
      create: 'content(create): {path}'
      update: 'content(update): {path}'
      delete: 'content(delete): {path}'
      rename: 'content(rename): {oldPath} -> {newPath}'

actions:
  - name: deploy-site
    label: Deploy GitHub Pages
    workflow: deploy.yml
