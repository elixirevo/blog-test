name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action payload
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect changed source posts
        id: changed-posts
        run: |
          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            files=""
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            files=$(git diff --diff-filter=ACMRT --name-only "${{ github.event.before }}" "${GITHUB_SHA}" -- 'src/content/posts/*.md')
          else
            files=$(git diff-tree --diff-filter=ACMRT --no-commit-id --name-only -r "${GITHUB_SHA}" -- 'src/content/posts/*.md')
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "$files"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Read public release settings
        id: release-settings
        run: |
          value=false

          if [ -f .env.production ]; then
            matched=$(grep -E '^PUBLIC_RELEASE_USE_TRANSLATIONS=' .env.production | tail -n 1 | cut -d= -f2- || true)
            if [ -n "$matched" ]; then
              value=$(printf '%s' "$matched" | tr -d '\r' | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")
            fi
          fi

          echo "use_translations=$value" >> "$GITHUB_OUTPUT"

      - name: Translate posts
        run: bun run translate:posts
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPL_API_URL: ${{ secrets.DEEPL_API_URL }}

      - name: Commit translated posts
        run: |
          if [ -z "$(git status --porcelain -- src/content/translations)" ]; then
            echo "No translated content changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/translations
          git commit -m "chore(i18n): sync translations [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Build site
        run: bun run build
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Sync post releases
        if: steps.changed-posts.outputs.files != ''
        run: bun ./scripts/sync-post-releases.mjs
        env:
          CHANGED_POST_FILES: ${{ steps.changed-posts.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_USE_TRANSLATIONS: ${{ steps.release-settings.outputs.use_translations }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
